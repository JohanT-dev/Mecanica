<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — FlotaPro</title>
    <link rel="stylesheet" href="../Css/style.css">
    <link rel="stylesheet" href="../Css/forms.css">
    <link rel="stylesheet" href="../Css/header.css">
    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: radial-gradient(circle at top right, #1a2a42, var(--bg));
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header .logo {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .auth-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .auth-tabs {
            display: flex;
            background: var(--bg-card2);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: var(--purple);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 142, 247, 0.3);
        }

        .hidden {
            display: none;
        }

        .btn-auth-submit {
            width: 100%;
            padding: 14px;
            background: var(--purple);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-auth-submit:hover {
            background: var(--purple-dark);
            transform: translateY(-2px);
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">🚗</div>
                <h2 id="auth-title">Bienvenido de nuevo</h2>
                <p id="auth-subtitle">Ingresa tus credenciales para gestionar tu flota</p>
            </div>

            <div class="auth-tabs">
                <div id="tab-login" class="auth-tab active" onclick="switchAuth('login')">Login</div>
                <div id="tab-register" class="auth-tab" onclick="switchAuth('register')">Registro</div>
            </div>

            <form id="form-login" onsubmit="handleAuth(event, 'login')">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="nombre@empresa.com" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth-submit">Entrar a FlotaPro →</button>
            </form>

            <form id="form-register" class="hidden" onsubmit="handleAuth(event, 'register')">
                <div class="field">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" placeholder="Tu nombre" required>
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="nombre@empresa.com" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="btn-auth-submit">Crear cuenta ahora</button>
            </form>

            <div class="auth-footer">
                <a href="../../index.html" style="color: var(--purple); text-decoration: none;">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // 1. Inicializar Firebase (Usa tus credenciales aquí)
        const firebaseConfig = {
            apiKey: "AIzaSyDIscuvYzPkfLje72y0onQq4MRlRuyaEkg",
            authDomain: "registro-de-flota.firebaseapp.com",
            projectId: "registro-de-flota",
            storageBucket: "registro-de-flota.firebasestorage.app",
            messagingSenderId: "80030689118",
            appId: "1:80030689118:web:be30ce41f5f650534591cf",
            measurementId: "G-13BHCBJXKM"
        };
        firebase.initializeApp(firebaseConfig);

        // 2. Lógica de UI para cambiar entre Login y Registro
        function switchAuth(mode) {
            const isLogin = mode === 'login';
            document.getElementById('form-login').classList.toggle('hidden', !isLogin);
            document.getElementById('form-register').classList.toggle('hidden', isLogin);
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-register').classList.toggle('active', !isLogin);

            document.getElementById('auth-title').textContent = isLogin ? "Bienvenido de nuevo" : "Crea tu cuenta";
            document.getElementById('auth-subtitle').textContent = isLogin ? "Gestiona tu flota de vehículos" : "Empieza a organizar tus activos hoy";
        }

        // 3. Lógica central de Autenticación
        async function handleAuth(e, mode) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = "Procesando...";
            btn.disabled = true;

            try {
                if (mode === 'login') {
                    const email = document.getElementById('login-email').value;
                    const pass = document.getElementById('login-pass').value;
                    await firebase.auth().signInWithEmailAndPassword(email, pass);
                } else {
                    const nombre = document.getElementById('reg-name').value;
                    const email = document.getElementById('reg-email').value;
                    const pass = document.getElementById('reg-pass').value;

                    const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, pass);
                    const token = await userCredential.user.getIdToken();

                    // Registrar perfil en Python
                    await fetch('http://127.0.0.1:5000/api/registrar-usuario', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, nombre })
                    });
                }
                window.location.href = 'index.html';
            } catch (err) {
                alert("Error: " + err.message);
                btn.textContent = mode === 'login' ? "Entrar a FlotaPro →" : "Crear cuenta ahora";
                btn.disabled = false;
            }
        }
    </script>

</body>

</html>
