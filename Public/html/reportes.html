<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — FlotaPro</title>
  <link rel="stylesheet" href="../Css/header.css">
  <link rel="stylesheet" href="../Css/Reportes.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="main-header">
    <a href="../../index.html" class="header-brand">
      <div class="brand-logo">🚗</div>
      <span class="brand-name">Flota<span>Pro</span></span>
    </a>
    <nav class="header-nav">
      <a href="../../index.html" class="nav-link">Dashboard</a>
      <a href="reportes.html" class="nav-link active">Reportes</a>
      <a href="historial.html" class="nav-link">Historial</a>
    </nav>
    <div class="header-actions">
      <button class="btn-login" onclick="window.location.href='../html/Login.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Iniciar sesión
      </button>
      <a href="agregar-auto.html" class="btn-add-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Agregar Auto
      </a>
    </div>
    <button class="btn-hamburger" id="hamburgerBtn" onclick="toggleMenu()">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </button>
  </header>

  <!-- MOBILE DRAWER -->
  <nav class="mobile-menu" id="mobileMenu">
    <a href="../../index.html" class="nav-link-mobile">🏠 Dashboard</a>
    <a href="reportes.html" class="nav-link-mobile active">📊 Reportes</a>
    <a href="historial.html" class="nav-link-mobile">🕓 Historial</a>
    <div class="menu-divider"></div>
    <button class="btn-login-mobile" onclick="window.location.href='../html/Login.html'">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Iniciar sesión
    </button>
    <a href="agregar-auto.html" class="btn-add-mobile" onclick="closeMobileMenu()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Agregar Auto
    </a>
  </nav>

  <div class="shell">
    <div class="report-container">
      <div class="report-card status-bueno">
          <h3>✅ BUENO</h3>
          <div class="count" id="count-bueno">0</div>
          <p>Autos registrados</p>
          <div class="last-added">
              Último añadido: <span id="last-bueno">--</span>
          </div>
      </div>
  
      <div class="report-card status-regular">
          <h3>🔧 REGULAR</h3>
          <div class="count" id="count-regular">0</div>
          <p>Autos registrados</p>
          <div class="last-added">
              Último añadido: <span id="last-regular">--</span>
          </div>
      </div>
  
      <div class="report-card status-malo">
          <h3>⚠️ MALO</h3>
          <div class="count" id="count-malo">0</div>
          <p>Autos registrados</p>
          <div class="last-added">
              Último añadido: <span id="last-malo">--</span>
          </div>
      </div>
  </div>
  </div>

  <tbody id="tabla-reportes-body">
  </tbody>
  <script type="module" src="../js/main.js"></script>

</body>
</html>
