<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial — FlotaPro</title>
    <link rel="stylesheet" href="../Css/Historial.css">
    <link rel="stylesheet" href="../Css/header.css">
</head>

<body>

    <!-- HEADER -->
    <header class="main-header">
        <a href="../../index.html" class="header-brand">
            <div class="brand-logo">🚗</div>
            <span class="brand-name">Flota<span>Pro</span></span>
        </a>
        <nav class="header-nav">
            <a href="../../index.html" class="nav-link">Dashboard</a>
            <a href="reportes.html" class="nav-link">Reportes</a>
            <a href="historial.html" class="nav-link active">Historial</a>
        </nav>
        <div class="header-actions">
            <button class="btn-login" onclick="window.location.href='../html/Login.html'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                </svg>
                Iniciar sesión
            </button>
            <a href="agregar-auto.html" class="btn-add-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"
                    stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Agregar Auto
            </a>
        </div>
        <button class="btn-hamburger" id="hamburgerBtn" onclick="toggleMenu()">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </button>
    </header>

    <!-- MOBILE DRAWER -->
    <nav class="mobile-menu" id="mobileMenu">
        <a href="../../index.html" class="nav-link-mobile">🏠 Dashboard</a>
        <a href="reportes.html" class="nav-link-mobile">📊 Reportes</a>
        <a href="historial.html" class="nav-link-mobile active">🕓 Historial</a>
        <div class="menu-divider"></div>
        <button class="btn-login-mobile" onclick="window.location.href='../html/Login.html'">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round">
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            Iniciar sesión
        </button>
        <a href="agregar-auto.html" class="btn-add-mobile" onclick="closeMobileMenu()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"
                stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Agregar Auto
        </a>
    </nav>


    <div class="shell">
        <div class="page-title-block">
            <h1>🕓 Historial de Revisiones</h1>
            <p>Registro completo de inspecciones y mantenimientos por vehículo</p>
        </div>

        <!-- RESUMEN -->
        <div class="summary-row">
            <div class="summary-card">
                <div class="s-value" id="count-total">0</div>
                <div class="s-label">Revisiones totales</div>
            </div>
            <div class="timeline" id="timeline-container">
            </div>
        </div>

        <!-- FILTROS -->
        <div class="filters-bar">
            <select class="filter-select">
                <option value="">Todos los vehículos</option>
                <option>Auto 01 — Toyota Corolla</option>
                <option>Auto 02 — Chevrolet Spark</option>
                <option>Auto 03 — Honda Civic</option>
                <option>Auto 04 — Ford Ranger</option>
            </select>
            <select class="filter-select">
                <option value="">Todos los estados</option>
                <option>Operativo</option>
                <option>En mantenimiento</option>
                <option>Fuera de servicio</option>
            </select>
            <select class="filter-select">
                <option value="">Último mes</option>
                <option>Últimos 3 meses</option>
                <option>Últimos 6 meses</option>
                <option>Este año</option>
            </select>
            <input type="text" class="filter-search" placeholder="🔍  Buscar técnico o vehículo...">
        </div>

        <!-- TIMELINE -->
        <div class="timeline">
        </div>

        <script>
            function toggleMenu() {
                document.getElementById('hamburgerBtn').classList.toggle('open');
                document.getElementById('mobileMenu').classList.toggle('open');
            }
            function closeMobileMenu() {
                document.getElementById('hamburgerBtn').classList.remove('open');
                document.getElementById('mobileMenu').classList.remove('open');
            }
            document.addEventListener('click', function (e) {
                const btn = document.getElementById('hamburgerBtn');
                const menu = document.getElementById('mobileMenu');
                if (!btn.contains(e.target) && !menu.contains(e.target)) {
                    btn.classList.remove('open');
                    menu.classList.remove('open');
                }
            });
            document.getElementById('loginModal').addEventListener('click', function (e) {
                if (e.target === this) this.classList.remove('open');
            });
        </script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
        <script src="../js/authHandler.js"></script>
        <script type="module" src="../js/Historial.js"></script>
</body>

</html>
